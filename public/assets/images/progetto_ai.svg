  <circle cx="300" cy="350" r="35" fill="#68d391" />
  
  <text x="400" y="500" font-family="sans-serif" font-size="28" fill="#c53030" text-anchor="middle" font-weight="bold">INTELLIGENZA ARTIFICIALE</text>
  <text x="400" y="540" font-family="sans-serif" font-size="20" fill="#718096" text-anchor="middle">Uniform Coloring • Algoritmi</text>
</svg>