  <line x1="400" y1="150" x2="300" y2="350" stroke="#cbd5e0" stroke-width="5"/>
  
  <!-- Nodes (Uniform Coloring Theme) -->
  <circle cx="250" cy="200" r="35" fill="#fc8181" />
  <circle cx="400" cy="150" r="35" fill="#68d391" />
  <circle cx="550" cy="250" r="35" fill="#f6e05e" />
