<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#fff5f5"/>
  <!-- Edges -->
  <line x1="250" y1="200" x2="400" y2="150" stroke="#cbd5e0" stroke-width="5"/>
  <line x1="400" y1="150" x2="550" y2="250" stroke="#cbd5e0" stroke-width="5"/>
  <line x1="550" y1="250" x2="450" y2="400" stroke="#cbd5e0" stroke-width="5"/>
  <line x1="450" y1="400" x2="300" y2="350" stroke="#cbd5e0" stroke-width="5"/>
  <line x1="300" y1="350" x2="250" y2="200" stroke="#cbd5e0" stroke-width="5"/>
